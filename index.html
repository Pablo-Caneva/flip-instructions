<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workflow</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="py-4 text-center hero-bg">
      <h1 class="h3 mb-1 site-title">Attempter Checklist</h1>
      <p class="mb-0 site-subtitle">
        Click any shape to expand.
      </p>
    </header>

    <main class="flow container-fluid px-0">
      <!-- Row 1: Category & Tools, System Prompt, Prompt -->
      <div class="row mb-5">
        <div class="col-12 col-md-4 d-flex justify-content-center mb-4 mb-md-0">
          <button
            class="node process"
            data-shape="process"
            data-title="Category & Tools"
            data-desc="This is the starting point of the process."
            data-card="catandtools"
          >
            <span class="label">Category & Tools</span>
          </button>
        </div>
        <div class="col-12 col-md-4 d-flex justify-content-center mb-4 mb-md-0">
          <button
            class="node process"
            data-shape="process"
            data-title="System Prompt"
            data-desc="Process step."
            data-card="systemprompt"
          >
            <span class="label">System Prompt</span>
          </button>
        </div>
        <div class="col-12 col-md-4 d-flex justify-content-center">
          <button
            class="node process"
            data-shape="process"
            data-title="Prompt"
            data-desc="Process step."
            data-card="prompt"
          >
            <span class="label">Prompt</span>
          </button>
        </div>
      </div>

      <!-- Row 2: Tool Calls, Tool Response, Text Response -->
      <div class="row mb-5">
        <div class="col-12 col-md-4 d-flex justify-content-center mb-4 mb-md-0">
          <button
            class="node process"
            data-shape="process"
            data-title="Tool Calls"
            data-desc="Process step."
            data-card="toolcalls"
          >
            <span class="label">Tool Calls</span>
          </button>
        </div>
        <div class="col-12 col-md-4 d-flex justify-content-center mb-4 mb-md-0">
          <button
            class="node process"
            data-shape="process"
            data-title="Tool Response"
            data-desc="Process step."
            data-card="toolresponse"
          >
            <span class="label">Tool Response</span>
          </button>
        </div>
        <div class="col-12 col-md-4 d-flex justify-content-center">
          <button
            class="node process"
            data-shape="process"
            data-title="Text Response"
            data-desc="Process step."
            data-card="textresponse"
          >
            <span class="label">Text Response</span>
          </button>
        </div>
      </div>

      <!-- Row 3: Placeholder, Categories Adherence, Final Checklist Before Submission -->
      <div class="row mb-5">
        <div class="col-12 col-md-4 d-flex justify-content-center mb-4 mb-md-0">
          <button
            class="node process"
            data-shape="process"
            data-title="Placeholder"
            data-desc="Process step."
            data-card="placeholder"
          >
            <span class="label">Placeholder</span>
          </button>
        </div>
        <div class="col-12 col-md-4 d-flex justify-content-center mb-4 mb-md-0">
          <button
            class="node process"
            data-shape="process"
            data-title="Categories Adherence"
            data-desc="Process step."
            data-card="categoriesadherence"
          >
            <span class="label">Categories Adherence</span>
          </button>
        </div>
        <div class="col-12 col-md-4 d-flex justify-content-center">
          <button
            class="node process"
            data-shape="process"
            data-title="Final Checklist Before Submission"
            data-desc="This is the end of the process."
            data-card="finalchecklist"
          >
            <span class="label">Final Checklist Before Submission</span>
          </button>
        </div>
      </div>
    </main>

    <!-- Fullscreen flip viewer -->
    <div id="viewer" class="viewer" aria-hidden="true">
      <div class="flipstage">
        <div class="flipcard">
          <div
            class="flipface front d-flex align-items-center justify-content-center"
          >
            <span class="muted small">flipping…</span>
          </div>

          <div class="flipface back">
            <div class="expanded-card shadow">
              <div class="expanded-header">
                <h2 id="viewerTitle" class="h5 mb-0">Title</h2>
              </div>
              <!-- JS will inject file content here -->
              <div class="expanded-body"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
