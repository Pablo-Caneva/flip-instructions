<div class="container-fluid h-100">
  <div class="row g-3 h-100">
    <!-- Left: 1/3 on desktop (no-close zone) -->
    <div class="col-12 col-lg-4 d-flex">
      <div class="content-text flex-grow-1 no-close-zone">
        <h3 class="h5 mb-3"><strong>System Prompt</strong></h3>
        <ul class="list-unstyled mb-0">
          <li>
            <label><input type="checkbox" /> <strong class="accent-red">Information</strong> used in the system prompt <strong>aligns with the task</strong></label>
          </li>
          <li>
            <label><input type="checkbox" /> If provided, the <strong class="accent-blue">application use context</strong> is pasted <em>word by word</em> into the system prompt</label>
          </li>
          <li>
            <label><input type="checkbox" /> The system prompt has at least <strong class="accent-green">4/6 building blocks</strong></label>
          </li>
          <li>
            <label><input type="checkbox" /> The system prompt has at least <strong class="accent-orange">5/7 complexity principles</strong></label>
          </li>
        </ul>
      </div>
    </div>

    <!-- Right: 2/3 on desktop (clickable to close) -->
    <div class="col-12 col-lg-8 d-flex close-on-click">
      <div class="flex-grow-1">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <img
              src="images/systemprompt/sys1.png"
              alt="System prompt reference 1"
              class="img-fluid rounded"
            />
          </div>
          <div class="col-12 col-md-6">
            <img
              src="images/systemprompt/sys2.png"
              alt="System prompt reference 2"
              class="img-fluid rounded"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
