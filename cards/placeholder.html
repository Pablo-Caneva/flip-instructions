<div class="container-fluid h-100">
  <div class="row g-3 h-100">
    <!-- Left: 1/3 on desktop (no-close zone) -->
    <div class="col-12 col-lg-4 d-flex">
      <div class="content-text flex-grow-1 no-close-zone">
        <h3 class="h5 mb-3"><strong>Placeholder</strong></h3>
        <ul class="list-unstyled mb-0">
          <li><label><input type="checkbox" /> Check <strong>number of <em>user</em> prompts</strong> is correctly selected</label></li>
          <li><label><input type="checkbox" /> <strong>Check if conversation has fewer than 10 user prompts or missing categories</strong></label>
            <ul>
              <li>If <strong class="accent-green">YES:</strong> → move on</li>
              <li>If <strong class="accent-red">NO:</strong> → Write another prompt</li>
            </ul>
          </li>
        </ul>
      </div>
    </div>

    <!-- Right: 2/3 on desktop (clickable to close) -->
    <div class="col-12 col-lg-8 d-flex close-on-click">
      <div class="flex-grow-1">
        <img
          src="images/placeholder/placeholder.png"
          alt="Placeholder reference"
          class="img-fluid rounded"
        />
      </div>
    </div>
  </div>
</div>
