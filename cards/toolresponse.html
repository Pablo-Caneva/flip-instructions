<div class="container-fluid h-100">
  <div class="row g-3 h-100">
    <!-- Left: 1/3 on desktop (no-close zone) -->
    <div class="col-12 col-lg-4 d-flex">
      <div class="content-text flex-grow-1 no-close-zone">
        <h3 class="h5 mb-3"><strong>Tool Response</strong></h3>
        <ul class="list-unstyled mb-0">
          <li><label><input type="checkbox" /> Type of error should be <strong class="accent-red">no issues</strong></label></li>
          <li><label><input type="checkbox" /> Check <strong>category flag</strong> is the same for this step (unless error recovery or state dependency)</label></li>
          <li><label><input type="checkbox" /> If category flag is <strong>error recovery</strong> or <strong>state dependency</strong>, it is checked until resolved</label></li>
          <li><label><input type="checkbox" /> Check <strong class="accent-blue">Response type</strong> is <code>tool_response</code></label></li>
          <li><label><input type="checkbox" /> Check <strong>Verified steps</strong></label></li>
        </ul>
      </div>
    </div>

    <!-- Right: 2/3 on desktop (clickable to close) -->
    <div class="col-12 col-lg-8 d-flex close-on-click">
      <div class="flex-grow-1">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <img
              src="images/toolresponse/toolr1.png"
              alt="Tool response reference 1"
              class="img-fluid rounded"
            />
          </div>
          <div class="col-12 col-md-6">
            <img
              src="images/toolresponse/toolr2.png"
              alt="Tool response reference 2"
              class="img-fluid rounded"
            />
          </div>
          <div class="col-12 col-md-6">
            <img
              src="images/toolresponse/toolr3.png"
              alt="Tool response reference 3"
              class="img-fluid rounded"
            />
          </div>
          <div class="col-12 col-md-6">
            <img
              src="images/toolresponse/toolr4.png"
              alt="Tool response reference 4"
              class="img-fluid rounded"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
